<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcador de Clipes do Futebol</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Marcador de Clipes ⚽</h1>
    <p class="subtitle">
      Clique no botão quando acontecer uma jogada importante. Os horários são salvos no Supabase para todos acessarem a mesma lista.
    </p>

    <div id="connectionNotice" class="notice warning">
      Configurando conexão com Supabase...
    </div>

    <section class="user-box">
      <label for="userName">Nome da pessoa</label>
      <input id="userName" type="text" placeholder="Digite seu nome" />
      <p id="ceoStatus" class="small hidden">CEO autenticado.</p>
    </section>

    <section id="filterBox" class="filter-box hidden">
      <label for="filterDate">Filtrar horários por dia</label>
      <div class="grid">
        <input id="filterDate" type="date" />
        <button class="muted" onclick="clearDateFilter()">Limpar filtro</button>
      </div>
    </section>

    <section class="actions">
      <button id="markBtn" class="primary" onclick="registerClip()">MARCAR CLIPE AGORA</button>

      <div class="grid action-grid">
        <button id="exportBtn" class="secondary hidden" onclick="exportTxt()">Exportar TXT</button>
        <button class="muted" onclick="changeUser()">Trocar nome</button>
      </div>

      <button class="muted" onclick="loadClips()">Atualizar lista</button>

      <button id="deleteBtn" class="danger hidden" onclick="deleteAllVisible()">Excluir horários exibidos</button>
    </section>

    <section class="list-box">
      <h2>Horários marcados</h2>
      <div id="clipsList"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
